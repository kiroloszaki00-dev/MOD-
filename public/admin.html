<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin - Add Product</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <header>
    <h1>Admin</h1>
    <a href="/">Storefront</a>
  </header>
  <main>
    <nav><a href="/orders.html">View Orders</a></nav>
    <form id="addForm" enctype="multipart/form-data">
      <label>Name<input name="name" required></label>
      <label>Price<input name="price" type="number" step="0.01" required></label>
      <label>Sizes (comma separated)<input name="sizes"></label>
      <label>Image URL (optional)<input name="imageUrl"></label>
      <label>Or upload image<input name="image" type="file" accept="image/*"></label>
      <label>Description<textarea name="description"></textarea></label>
      <label>Specs<textarea name="specs"></textarea></label>
      <button type="submit">Add Product</button>
    </form>
    <div id="result"></div>
  </main>
  <script>
    const form = document.getElementById('addForm');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = new FormData(form);
      const res = await fetch('/api/admin/products', { method: 'POST', body: data });
      const json = await res.json();
      document.getElementById('result').textContent = json.name ? 'Added: ' + json.name : JSON.stringify(json);
      form.reset();
    });
  </script>
</body>
</html>
